<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro — FileManager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body class="fm-auth d-flex align-items-center py-5">
    <div class="container" style="max-width: 440px">
      <div class="text-center mb-4">
        <h1 class="h4 fm-brand text-secondary">FileManager</h1>
        <p class="text-muted small mb-0">Crie sua conta</p>
      </div>
      <div class="card fm-card">
        <div class="card-body p-4">
          <h2 class="h5 mb-3">Cadastro</h2>
          <div
            id="cadastro-alert"
            class="alert alert-danger py-2 small d-none"
            role="alert"
          ></div>
          <form id="form-cadastro" novalidate>
            <div class="mb-3">
              <label for="name" class="form-label">Nome completo</label>
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                required
                maxlength="255"
              />
            </div>
            <div class="mb-3">
              <label for="user_name" class="form-label">Nome de usuário</label>
              <input
                type="text"
                class="form-control"
                id="user_name"
                name="user_name"
                autocomplete="username"
                required
                maxlength="100"
              />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Senha</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                autocomplete="new-password"
                required
                maxlength="10"
                minlength="1"
              />
              <div class="form-text">
                Máximo 10 caracteres. Tipos de arquivo permitidos no upload: jpg,
                png, webp, pdf, docx, xlsx.
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
          </form>
          <hr class="my-4" />
          <p class="text-center text-muted small mb-0">
            Já tem conta?
            <a href="index.html">Entrar</a>
          </p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cadastro.js"></script>
  </body>
</html>

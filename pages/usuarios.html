<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usuários — FileManager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../css/styles.css" rel="stylesheet" />
  </head>
  <body class="fm-app-body">
    <nav class="navbar navbar-expand-lg navbar-light bg-white fm-navbar">
      <div id="fm-navbar-root" data-fm-nav="users" class="w-100"></div>
    </nav>

    <main class="fm-content px-3 px-lg-4 py-4">
      <div
        class="d-flex flex-column flex-md-row align-items-md-center justify-content-md-between gap-3 mb-4"
      >
        <div>
          <h1 class="h4 mb-1">Usuários</h1>
          <p class="text-muted small mb-0">
            Utilizadores registados na API (autenticação necessária).
          </p>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <button type="button" class="btn btn-outline-primary" id="btn-refresh">
            Atualizar lista
          </button>
          <a class="btn btn-primary" id="fm-link-novo-usuario" href="#">Novo usuário</a>
        </div>
      </div>

      <div id="usuarios-erro" class="alert alert-danger d-none" role="alert"></div>
      <div id="lista-vazia" class="alert alert-light border d-none" role="status">
        Nenhum utilizador encontrado. Use <strong>Novo usuário</strong> para registar.
      </div>

      <div class="card fm-card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 fm-table" id="tabela-usuarios">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Nome completo</th>
                <th>Usuário</th>
                <th>Situação</th>
                <th>Cadastrado em</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/usuarios.js"></script>
  </body>
</html>

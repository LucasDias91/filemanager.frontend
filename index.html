<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar — FileManager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body class="fm-auth d-flex align-items-center py-5">
    <div class="container" style="max-width: 420px">
      <div class="text-center mb-4">
        <h1 class="h4 fm-brand text-secondary">FileManager</h1>
        <p class="text-muted small mb-0">Acesse com seu usuário</p>
      </div>
      <div class="card fm-card">
        <div class="card-body p-4">
          <h2 class="h5 mb-3">Autenticação</h2>
          <div
            id="login-success"
            class="alert alert-success py-2 small d-none"
            role="alert"
          >
            Cadastro concluído. Faça login.
          </div>
          <div
            id="login-alert"
            class="alert alert-danger py-2 small d-none"
            role="alert"
          ></div>
          <form id="form-login" novalidate>
            <div class="mb-3">
              <label for="username" class="form-label">Usuário</label>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                autocomplete="username"
                required
                maxlength="100"
              />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Senha</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                autocomplete="current-password"
                required
                maxlength="10"
              />
              <div class="form-text">Até 10 caracteres (conforme API).</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
          </form>
          <hr class="my-4" />
          <p class="text-center text-muted small mb-0">
            Não tem conta?
            <a href="cadastro.html">Cadastre-se</a>
          </p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script>
      if (new URLSearchParams(location.search).get("cadastro") === "ok") {
        document.getElementById("login-success").classList.remove("d-none");
      }
    </script>
  </body>
</html>
